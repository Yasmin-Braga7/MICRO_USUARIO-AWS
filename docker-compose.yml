version: "3.9"

services:
  usuario:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca-usuario
    restart: unless-stopped

    ports:
      - "9501:9501"

    environment:
      PORT:     9501
      NODE_ENV: production

      # Autenticação Universal do Infisical (Machine Identity)
      # Valores vêm do .env local (não commitado) — não deixar valor fixo aqui.
      CLIENT_ID:            ${CLIENT_ID}
      CLIENT_SECRET:        ${CLIENT_SECRET}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV:        ${INFISICAL_ENV:-dev}
      INFISICAL_SECRET_PATH: ${INFISICAL_SECRET_PATH:-/}

      # Banco de dados — vem do .env em produção
      DATABASE_URL: ${DATABASE_URL}

      # RabbitMQ
      RABBITMQ_URL:             ${RABBITMQ_URL}
      RABBITMQ_RECONNECT_DELAY: ${RABBITMQ_RECONNECT_DELAY:-5000}

    networks:
      - biblioteca-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  biblioteca-net:
    name: biblioteca-net
    driver: bridge
